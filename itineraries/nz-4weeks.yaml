trip: New Zealand 2026
description: Four-week road trip starting 22 Nov 2026

# Schema notes:
#   route:  ordered points that shape the day's line (use `type: via` for
#           route-only waypoints that should not get a map marker).
#   stops:  map placemarks that are not part of the driving line
#           (type: attraction, viewpoint, trailhead, overnight, ...).
#   hike/ferry: draw the line straight instead of routing by road.
# A day without `route:` has placemarks only and no route line.

days:

  - day: 1
    title: Arrive Auckland
    notes: Recover from flight.
    photo: https://upload.wikimedia.org/wikipedia/commons/thumb/b/bb/Auckland_skyline_from_harbour.png/1280px-Auckland_skyline_from_harbour.png
    photo_caption: Auckland skyline from the harbour
    stops:
      - { name: Auckland, type: overnight, lat: -36.8485, lon: 174.7633 }

  - day: 2
    title: Explore Auckland
    notes: Devonport, waterfront, Wynyard Quarter.
    photo: https://upload.wikimedia.org/wikipedia/commons/thumb/b/bb/Auckland_skyline_from_harbour.png/1280px-Auckland_skyline_from_harbour.png
    photo_caption: Auckland skyline from the harbour
    stops:
      - { name: Auckland, type: overnight, lat: -36.8485, lon: 174.7633 }

  - day: 3
    title: Auckland → Waitomo
    notes: Visit the glowworm caves.
    route:
      - { name: Auckland, type: overnight, lat: -36.8485, lon: 174.7633 }
      - { name: Waitomo, type: overnight, lat: -38.2617, lon: 175.1035 }
    stops:
      - { name: Waitomo Glowworm Caves, type: attraction, lat: -38.2617, lon: 175.1035 }

  - day: 4
    title: Waitomo → Tongariro National Park
    notes: Prepare for tomorrow's hike.
    route:
      - { name: Waitomo, type: overnight, lat: -38.2617, lon: 175.1035 }
      - { name: Tongariro National Park, type: overnight, lat: -39.1887, lon: 175.5930 }

  - day: 5
    title: Tongariro Alpine Crossing
    hike: true
    notes: Weather backup day if necessary.
    photo: https://upload.wikimedia.org/wikipedia/commons/thumb/6/61/Emerald_Lakes%2C_New_Zealand.jpg/1280px-Emerald_Lakes%2C_New_Zealand.jpg
    photo_caption: Emerald Lakes on the Tongariro Alpine Crossing
    route:
      - { name: Mangatepopo Trailhead, type: trailhead, lat: -39.1445, lon: 175.5811 }
      - { name: Ketetahi Trailhead, type: trailhead, lat: -39.0737, lon: 175.6638 }
    stops:
      - { name: Tongariro National Park, type: overnight, lat: -39.1887, lon: 175.5930 }

  - day: 6
    title: Tongariro → Wellington
    photo: https://upload.wikimedia.org/wikipedia/commons/thumb/f/f0/Old_and_New_on_the_Wellington_Waterfront_%2826045169054%29.jpg/1280px-Old_and_New_on_the_Wellington_Waterfront_%2826045169054%29.jpg
    photo_caption: Wellington waterfront — old and new
    route:
      - { name: Tongariro National Park, type: overnight, lat: -39.1887, lon: 175.5930 }
      - { name: Wellington, type: overnight, lat: -41.2866, lon: 174.7756 }

  - day: 7
    title: Ferry to Picton → Nelson
    ferry: true
    notes: Interislander ferry across Cook Strait, then drive to Nelson.
    route:
      - { name: Wellington Ferry Terminal, type: ferry_terminal, lat: -41.2642, lon: 174.7870 }
      - { name: Picton Ferry Terminal, type: ferry_terminal, lat: -41.2855, lon: 174.0050 }
      - { name: Nelson, type: overnight, lat: -41.2706, lon: 173.2840 }

  - day: 8
    title: Abel Tasman National Park
    hike: true
    photo: https://upload.wikimedia.org/wikipedia/commons/thumb/2/21/Abel_Tasman_National_Park_beach_plant.jpg/1280px-Abel_Tasman_National_Park_beach_plant.jpg
    photo_caption: Abel Tasman National Park coastline
    route:
      - { name: Nelson, type: overnight, lat: -41.2706, lon: 173.2840 }
      - { name: Marahau Trailhead, type: trailhead, lat: -40.9911, lon: 173.0081 }

  - day: 9
    title: Nelson → Punakaiki
    notes: Murchison and Westport are drive-through towns.
    photo: https://upload.wikimedia.org/wikipedia/commons/thumb/3/34/PancakeRocks_MC.jpg/1280px-PancakeRocks_MC.jpg
    photo_caption: Pancake Rocks at Punakaiki
    route:
      - { name: Nelson, type: overnight, lat: -41.2706, lon: 173.2840 }
      - { name: Murchison, type: via, lat: -41.8092, lon: 172.3330 }
      - { name: Westport, type: via, lat: -41.7526, lon: 171.6034 }
      - { name: Punakaiki, type: overnight, lat: -42.1117, lon: 171.3245 }
    stops:
      - { name: Pancake Rocks, type: attraction, lat: -42.1169, lon: 171.3270 }

  - day: 10
    title: Punakaiki → Franz Josef
    route:
      - { name: Punakaiki, type: overnight, lat: -42.1117, lon: 171.3245 }
      - { name: Hokitika, type: via, lat: -42.7170, lon: 170.9660 }
      - { name: Franz Josef, type: overnight, lat: -43.3881, lon: 170.1836 }
    stops:
      - { name: Hokitika Gorge, type: attraction, lat: -42.9552, lon: 171.0159 }

  - day: 11
    title: Franz Josef area
    hike: true
    photo: https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Franz_Josef_Glacier_14.jpg/1280px-Franz_Josef_Glacier_14.jpg
    photo_caption: Franz Josef Glacier
    route:
      - { name: Franz Josef, type: overnight, lat: -43.3881, lon: 170.1836 }
      - { name: Lake Matheson, type: viewpoint, lat: -43.4378, lon: 169.9630 }

  - day: 12
    title: Franz Josef → Wānaka
    route:
      - { name: Franz Josef, type: overnight, lat: -43.3881, lon: 170.1836 }
      - { name: Haast, type: via, lat: -43.8818, lon: 169.0430 }
      - { name: Wanaka, type: overnight, lat: -44.6966, lon: 169.1362 }
    stops:
      - { name: Blue Pools, type: attraction, lat: -44.2255, lon: 169.2558 }

  - day: 13
    title: Wānaka
    hike: true
    photo: https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Mount_Albert_Southern_Alps_NZ.jpg/1280px-Mount_Albert_Southern_Alps_NZ.jpg
    photo_caption: Southern Alps near Wānaka
    route:
      - { name: Wanaka, type: overnight, lat: -44.6966, lon: 169.1362 }
      - { name: Roys Peak Trailhead, type: trailhead, lat: -44.6735, lon: 169.0718 }

  - day: 14
    title: Wānaka → Te Anau
    route:
      - { name: Wanaka, type: overnight, lat: -44.6966, lon: 169.1362 }
      - { name: Te Anau, type: overnight, lat: -45.4145, lon: 167.7180 }

  - day: 15
    title: Kepler Track Day 1
    hike: true
    route:
      - { name: Te Anau, type: overnight, lat: -45.4145, lon: 167.7180 }
      - { name: Kepler Track Car Park, type: trailhead, lat: -45.4427, lon: 167.6901 }
      - { name: Luxmore Hut, type: hut, lat: -45.3853, lon: 167.6192 }

  - day: 16
    title: Kepler Track Day 2
    hike: true
    route:
      - { name: Luxmore Hut, type: hut, lat: -45.3853, lon: 167.6192 }
      - { name: Iris Burn Hut, type: hut, lat: -45.3990, lon: 167.5095 }

  - day: 17
    title: Kepler Track Day 3
    hike: true
    route:
      - { name: Iris Burn Hut, type: hut, lat: -45.3990, lon: 167.5095 }
      - { name: Moturau Hut, type: hut, lat: -45.4817, lon: 167.6107 }

  - day: 18
    title: Kepler Track Day 4
    hike: true
    route:
      - { name: Moturau Hut, type: hut, lat: -45.4817, lon: 167.6107 }
      - { name: Kepler Track Car Park, type: trailhead, lat: -45.4427, lon: 167.6901 }
      - { name: Te Anau, type: overnight, lat: -45.4145, lon: 167.7180 }

  - day: 19
    title: Rest day
    stops:
      - { name: Te Anau, type: overnight, lat: -45.4145, lon: 167.7180 }

  - day: 20
    title: Milford Sound
    notes: Day trip up the Milford Road and back.
    photo: https://upload.wikimedia.org/wikipedia/commons/thumb/d/da/Milford_Sound_in_Fiordland_National_Park_01.jpg/1280px-Milford_Sound_in_Fiordland_National_Park_01.jpg
    photo_caption: Milford Sound / Piopiotahi
    route:
      - { name: Te Anau, type: overnight, lat: -45.4145, lon: 167.7180 }
      - { name: Milford Sound, type: viewpoint, lat: -44.6682, lon: 167.9270 }
      - { name: Te Anau, type: overnight, lat: -45.4145, lon: 167.7180 }

  - day: 21
    title: Te Anau → Queenstown
    route:
      - { name: Te Anau, type: overnight, lat: -45.4145, lon: 167.7180 }
      - { name: Queenstown, type: overnight, lat: -45.0312, lon: 168.6626 }

  - day: 22
    title: Queenstown
    photo: https://upload.wikimedia.org/wikipedia/commons/thumb/f/f6/Queenstown_Bay_Lake_Wakatipu_04.jpg/1280px-Queenstown_Bay_Lake_Wakatipu_04.jpg
    photo_caption: Queenstown Bay, Lake Wakatipu
    stops:
      - { name: Queenstown, type: overnight, lat: -45.0312, lon: 168.6626 }

  - day: 23
    title: Queenstown
    stops:
      - { name: Queenstown, type: overnight, lat: -45.0312, lon: 168.6626 }

  - day: 24
    title: Queenstown → Aoraki / Mount Cook
    route:
      - { name: Queenstown, type: overnight, lat: -45.0312, lon: 168.6626 }
      - { name: Aoraki / Mount Cook, type: overnight, lat: -43.7332, lon: 170.0937 }

  - day: 25
    title: Mount Cook National Park
    hike: true
    photo: https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Valley_of_Hooker_River_02.jpg/1280px-Valley_of_Hooker_River_02.jpg
    photo_caption: Hooker Valley toward Aoraki / Mount Cook
    route:
      - { name: Mount Cook Village, type: overnight, lat: -43.7332, lon: 170.0937 }
      - { name: Hooker Valley Trailhead, type: trailhead, lat: -43.7184, lon: 170.0984 }

  - day: 26
    title: Mount Cook → Lake Tekapo
    photo: https://upload.wikimedia.org/wikipedia/commons/7/75/Church_of_the_Good_Shepherd_%28Lake_Tekapo%29.jpg
    photo_caption: Church of the Good Shepherd, Lake Tekapo
    route:
      - { name: Mount Cook Village, type: overnight, lat: -43.7332, lon: 170.0937 }
      - { name: Lake Tekapo, type: overnight, lat: -44.0047, lon: 170.4773 }

  - day: 27
    title: Lake Tekapo → Christchurch
    route:
      - { name: Lake Tekapo, type: overnight, lat: -44.0047, lon: 170.4773 }
      - { name: Christchurch, type: overnight, lat: -43.5321, lon: 172.6362 }

  - day: 28
    title: Depart Christchurch
    photo: https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Christchurch_Cathedral_Square.jpg/1280px-Christchurch_Cathedral_Square.jpg
    photo_caption: Christchurch Cathedral Square
    stops:
      - { name: Christchurch, type: overnight, lat: -43.5321, lon: 172.6362 }
