<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f5c5c" />
  <title>Trip</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="chrome">
    <div class="chrome-main">
      <h1 id="trip-title" class="trip-title">Loading…</h1>
      <p id="trip-meta" class="trip-meta"></p>
    </div>
    <div class="chrome-actions">
      <span id="offline-dot" class="offline-dot" title="Online" hidden></span>
      <button type="button" id="btn-days" class="btn ghost" hidden>Days</button>
      <div id="mode-toggle" class="seg" role="group" aria-label="View mode" hidden>
        <button type="button" data-mode="list" class="seg-btn is-active">List</button>
        <button type="button" data-mode="map" class="seg-btn">Map</button>
      </div>
    </div>
  </header>

  <div id="app" class="app">
    <aside id="day-index" class="day-index" aria-label="Days"></aside>
    <main id="map-pane" class="map-pane">
      <div id="map" class="map" role="application" aria-label="Trip map"></div>
      <div id="tile-banner" class="banner" hidden>Map tiles unavailable — showing route only.</div>
      <div class="map-toolbar">
        <button type="button" id="btn-full-trip" class="btn small" aria-pressed="false">Full trip</button>
      </div>
    </main>
    <section id="detail" class="detail" aria-live="polite"></section>
  </div>

  <div id="day-picker" class="day-picker" hidden>
    <div class="day-picker-sheet">
      <header class="day-picker-head">
        <h2>Jump to day</h2>
        <button type="button" id="btn-close-picker" class="btn ghost">Close</button>
      </header>
      <input type="search" id="day-search" class="day-search" placeholder="Filter days…" autocomplete="off" />
      <div id="day-picker-list" class="day-picker-list"></div>
    </div>
  </div>

  <div id="lightbox" class="lightbox" hidden>
    <button type="button" class="lightbox-close btn ghost" id="lightbox-close">Close</button>
    <img id="lightbox-img" alt="" />
    <p id="lightbox-caption" class="lightbox-caption"></p>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="app.js"></script>
</body>
</html>
