trip: New Zealand 2026
description: Four-week road trip starting 22 Nov 2026

# Schema notes:
#   route:  ordered points that shape the day's line (use `type: via` for
#           route-only waypoints that should not get a map marker).
#   stops:  map placemarks that are not part of the driving line
#           (type: attraction, viewpoint, trailhead, overnight, ...).
#   hike/ferry: draw the line straight instead of routing by road.
# A day without `route:` has placemarks only and no route line.

days:

  - day: 1
    title: Arrive Auckland
    notes: Recover from flight.
    stops:
      - { name: Auckland, type: overnight, lat: -36.8485, lon: 174.7633 }

  - day: 2
    title: Explore Auckland
    notes: Devonport, waterfront, Wynyard Quarter.
    stops:
      - { name: Auckland, type: overnight, lat: -36.8485, lon: 174.7633 }

  - day: 3
    title: Auckland → Waitomo
    notes: Visit the glowworm caves.
    route:
      - { name: Auckland, type: overnight, lat: -36.8485, lon: 174.7633 }
      - { name: Waitomo, type: overnight, lat: -38.2617, lon: 175.1035 }
    stops:
      - { name: Waitomo Glowworm Caves, type: attraction, lat: -38.2617, lon: 175.1035 }

  - day: 4
    title: Waitomo → Tongariro National Park
    notes: Prepare for tomorrow's hike.
    route:
      - { name: Waitomo, type: overnight, lat: -38.2617, lon: 175.1035 }
      - { name: Tongariro National Park, type: overnight, lat: -39.1887, lon: 175.5930 }

  - day: 5
    title: Tongariro Alpine Crossing
    hike: true
    notes: Weather backup day if necessary.
    route:
      - { name: Mangatepopo Trailhead, type: trailhead, lat: -39.1445, lon: 175.5811 }
      - { name: Ketetahi Trailhead, type: trailhead, lat: -39.0737, lon: 175.6638 }
    stops:
      - { name: Tongariro National Park, type: overnight, lat: -39.1887, lon: 175.5930 }

  - day: 6
    title: Tongariro → Wellington
    route:
      - { name: Tongariro National Park, type: overnight, lat: -39.1887, lon: 175.5930 }
      - { name: Wellington, type: overnight, lat: -41.2866, lon: 174.7756 }

  - day: 7
    title: Ferry to Picton → Nelson
    ferry: true
    notes: Interislander ferry across Cook Strait, then drive to Nelson.
    route:
      - { name: Wellington Ferry Terminal, type: ferry_terminal, lat: -41.2642, lon: 174.7870 }
      - { name: Picton Ferry Terminal, type: ferry_terminal, lat: -41.2855, lon: 174.0050 }
      - { name: Nelson, type: overnight, lat: -41.2706, lon: 173.2840 }

  - day: 8
    title: Abel Tasman National Park
    hike: true
    route:
      - { name: Nelson, type: overnight, lat: -41.2706, lon: 173.2840 }
      - { name: Marahau Trailhead, type: trailhead, lat: -40.9911, lon: 173.0081 }

  - day: 9
    title: Nelson → Punakaiki
    notes: Murchison and Westport are drive-through towns.
    route:
      - { name: Nelson, type: overnight, lat: -41.2706, lon: 173.2840 }
      - { name: Murchison, type: via, lat: -41.8092, lon: 172.3330 }
      - { name: Westport, type: via, lat: -41.7526, lon: 171.6034 }
      - { name: Punakaiki, type: overnight, lat: -42.1117, lon: 171.3245 }
    stops:
      - { name: Pancake Rocks, type: attraction, lat: -42.1169, lon: 171.3270 }

  - day: 10
    title: Punakaiki → Franz Josef
    route:
      - { name: Punakaiki, type: overnight, lat: -42.1117, lon: 171.3245 }
      - { name: Hokitika, type: via, lat: -42.7170, lon: 170.9660 }
      - { name: Franz Josef, type: overnight, lat: -43.3881, lon: 170.1836 }
    stops:
